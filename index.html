<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The 90-Day Strategy Builder</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Helvetica, Arial, sans-serif;
        background: #efe9df;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #efe9df; }
      ::-webkit-scrollbar-thumb { background: #c9bda9; border-radius: 3px; }
      button { font-family: inherit; cursor: pointer; }

      @media print {
        @page { margin: 1.5cm; size: A4; }
        body { background: #fff !important; }
        .mav-noprint { display: none !important; }
        .mav-progress, .mav-header { display: none !important; }
        .mav-content { overflow: visible !important; height: auto !important; padding: 0 !important; }
        .mav-plan-root { max-width: 100% !important; }
        .mav-card { break-inside: avoid; page-break-inside: avoid; box-shadow: none !important; border: 1px solid #e5e5e5 !important; }
        .mav-plan-root > div:first-child { background: #2a2520 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
